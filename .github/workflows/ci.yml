name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      NEXT_PUBLIC_APP_URL: https://example.com
      MERCADO_PAGO_ACCESS_TOKEN: test-mercado-pago-token
      MERCADO_PAGO_WEBHOOK_SECRET: test-webhook-secret
      MERCADO_PAGO_CLIENT_ID: test-client-id
      MERCADO_PAGO_CLIENT_SECRET: test-client-secret
      MERCADO_PAGO_OAUTH_REDIRECT_URI: https://example.com/api/mercado-pago/oauth/callback
      PAYMENT_ACCOUNT_ENCRYPTION_KEY: 12345678901234567890123456789012
      TWILIO_ACCOUNT_SID: test-account-sid
      TWILIO_AUTH_TOKEN: test-auth-token
      TWILIO_WHATSAPP_FROM: whatsapp:+15555555555
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm run audit:prod

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  filesystem-scan:
    name: Filesystem Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH
